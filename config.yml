#### Data parameters

# datapath: /iridisfs/ddnb/affinity/experiments/pose2-vae-experiment/input_arrays
# affinity: /iridisfs/ddnb/affinity/experiments/pose2-vae-experiment/affinity_an.csv
# classes: /iridisfs/ddnb/affinity/experiments/pose2-vae-experiment/class_lst.csv
restart: false
limit: 1000 # limits the number of samples to load
split: 20 # percentage of data to use for validation
datatype: npy

#### Data processing parameters
shift_mean: False
gaussian_blur: False
normalise: False
rescale: False

#### Network parameters

depth:  2
channels:  128
# filters: [8, 16, 32, 64]
latent_dims:  96
pose_dims: 0 #

model: c #

#### Training parameters

no_val_drop: true
epochs:  400  #
batch:  64 #
learning:  0.001
gpu:  true # GPU's not being used (maybe due to torch version, try another conda env)
freq_sta: 120  # frequency of state saves

#### Loss parameters

beta:  0.001 # Too low can lead to overfitting, too high can lead to underfitting.
gamma: 0.0 #
loss_fn:  MSE
klreduction: mean

#### Cyclical annealing parameters for beta
beta_min: 0.0
beta_cycle: 5
beta_ratio: 0.5
cyc_method_beta :  flat #cycle_sigmoid

#### Cyclical annealing parameters for gamma
gamma_min: 0.0
gamma_cycle: 5
gamma_ratio: 0.5
cyc_method_gamma :  flat #cycle_sigmoid

#### Evaluation parameters
eval:  false
freq_eval: 60 # frequency of test evaluation (if test present)

#### Visualization parameters
vis_los:  true  # loss on/off (every epoch from epoch 2)
vis_acc:  true  # confusion matrices and F1 scores on/off (frequency controlled)
vis_rec:  false  # reconstructions on/off (frequency controlled)
vis_emb:  true  # latent embeddings on/off (frequency controlled)
vis_int:  false  # latent interpolations on/off (frequency controlled)
vis_dis:  false  # latent disentanglement on/off (frequency controlled)
vis_pos:  false  # pose disentanglement on/off (frequency controlled)
# vis_pose_class: 1,2 # comma separated string eg. 1,2
vis_cyc:  false  # beta for cyclic anealing on/off (once per run)
vis_aff:  false   # affinity matrix on/off (once per run)
vis_his:  false  # class distribution histogram on/off (once per run)
vis_sim:  false  # latent space similarity matrix on/off
vis_all:  false   # sets all above to on/off      #
dynamic:  false    # dynamic embedding visualisations on/off (freq same as freq_emb) # Causes an error in "meta_df["image"] = meta_df["image"].apply(vis.merge)"

freq_acc: 60  # frequency of accuracy visualisation
freq_rec: 60  # frequency of reconstruction visualisation
freq_emb: 60  # frequency of latent embedding visualisation
# freq_int: 10  # frequency of latent interpolation visualisation
# freq_dis: 10  # frequency of latent disentanglement visualisation
# freq_pos: 10  # frequency of pose disentanglement visualisation
# freq_sim: 10  # frequency of similarity matrix visualisation
# freq_all: 10  # sets all above to the same value (inc freq_sta and freq_eval)

#### debug parameters
debug: false

#### Misc parameters
# shift_min: false
# tensorboard : false

classifier: KNN

# # define a color mapping for consistent colors throughout visualizations
# #### Visualization color parameters
color_lookup:
  B: [1.0, 0.0, 0.0]     # Red (RGB values 0-1)
  b_cell: [0.5, 0.0, 0.0]    # Dark Red
  CD4-T: [0.0, 1.0, 0.0]  # Green
  CD4-T2: [0.0, 0.5, 0.0] # Dark Green
  CD8-T: [0.0, 0.0, 1.0]  # Blue
  CD8-T2: [0.0, 0.0, 0.5] # Dark Blue
  other-T: [0.0, 0.1, 0.1] # Teal
  other-T2: [0.0, 0.5, 0.5] # Dark Teal
  t_cell: [0.0, 0.9, 0.9] # Light Teal
  DC: [1.0, 1.0, 0.0]  # Yellow
  DC2: [0.5, 0.5, 0.0] # Dark Yellow
  Mono: [1.0, 0.5, 0.0] # Orange
  Mono2: [1.0, 0.8, 0.4] # Tan
  NK: [1.0, 0.0, 1.0] # Purple
  NK2: [0.5, 0.0, 0.5] # Dark Purple
  # Add more class-color mappings as needed
  # Classes not listed here will use grey as default color